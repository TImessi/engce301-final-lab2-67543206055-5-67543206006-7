services:
  # --- DATABASES ---
  auth-db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpass
      POSTGRES_DB: authdb
    ports:
      - "5433:5432"
    volumes:
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  task-db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpass
      POSTGRES_DB: taskdb
    ports:
      - "5434:5432"
    volumes:
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  user-db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpass
      POSTGRES_DB: userdb
    ports:
      - "5435:5432"
    volumes:
      - ./user-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  # --- SERVICES ---
  auth-service:
    build: ./auth-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://admin:adminpass@auth-db:5432/authdb
      JWT_SECRET: your-shared-secret-key
      PORT: 3001
    depends_on:
      - auth-db

  task-service:
    build: ./task-service
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgres://admin:adminpass@task-db:5432/taskdb
      JWT_SECRET: your-shared-secret-key
      PORT: 3002
    depends_on:
      - task-db

  user-service:
    build: ./user-service
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgres://admin:adminpass@user-db:5432/userdb
      JWT_SECRET: your-shared-secret-key
      PORT: 3003
    depends_on:
      - user-db